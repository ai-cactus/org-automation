name: Org Activity Alert

on:
  workflow_call:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Alert Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[GitHub Activity] ${{ github.event_name }} in ${{ github.repository }}"
          to: tomi@theraptly.com
          from: GitHub Activity Bot
          body: |
            Event: ${{ github.event_name }}
            Repo: ${{ github.repository }}
            Actor: ${{ github.actor }}
            
            Payload:
            ${{ toJson(github.event) }}